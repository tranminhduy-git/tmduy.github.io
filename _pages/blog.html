const POSTS = [

    body:

// â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

function formatDate(iso) {
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function showHome() {
  document.getElementById('view-read').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  window.scrollTo(0, 0);
}

function readPost(idx) {
  const p = POSTS[idx];
  document.getElementById('read-date').textContent = formatDate(p.date);
  document.getElementById('read-tag').textContent  = p.tag;
  document.getElementById('read-title').textContent = p.title;

  // Render body: split on double newline â†’ paragraphs; preserve inline HTML tags
  const html = p.body
    .split(/\n\n+/)
    .map(block => block.startsWith('<h2') || block.startsWith('<blockquote')
      ? block
      : `<p>${block.replace(/\n/g, '<br>')}</p>`)
    .join('');

  document.getElementById('read-body').innerHTML = html;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-read').classList.add('active');
  window.scrollTo(0, 0);
}

// Render post list on load
(function renderList() {
  const el = document.getElementById('post-list');
  el.innerHTML = POSTS.map((p, i) => `
    <div class="post-card" onclick="readPost(${i})">
      <div class="post-meta">
        <span class="post-date">${formatDate(p.date)}</span>
        <span class="post-tag">${p.tag}</span>
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-excerpt">${p.excerpt}</div>
    </div>
  `).join('');
})();
